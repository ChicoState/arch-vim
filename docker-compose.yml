
services:
  backend:
    container_name: django-backend
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    container_name: react-frontend
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:cached
      - react_frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
      - FAST_REFRESH=true
      - HOST=0.0.0.0
      - PORT=3000
    depends_on:
      - backend

volumes:
  react_frontend_node_modules:
